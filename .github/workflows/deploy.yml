name: Build and Deploy to Raspberry Pi

on:
    push:
        branches:
            - main

jobs:
    build-and-deploy:
        runs-on: ubuntu-latest

        steps:
            # Step 1: Checkout the repository
            - name: Checkout code
              uses: actions/checkout@v4

            # Step 2: Set up Node.js
            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'npm'

            # Step 3: Install dependencies
            - name: Install dependencies
              run: npm ci

            # Step 4: Build the project
            - name: Build project
              run: npm run build

            # Step 5: Install cloudflared
            - name: Install cloudflared
              run: |
                  curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb -o cloudflared.deb
                  sudo dpkg -i cloudflared.deb

            # Step 6: Configure SSH to route through Cloudflare Tunnel
            - name: Configure SSH
              run: |
                  mkdir -p ~/.ssh
                  echo "${{ secrets.PI_SSH_KEY }}" > ~/.ssh/id_ed25519
                  chmod 600 ~/.ssh/id_ed25519
                  cat >> ~/.ssh/config <<EOF
                  Host ${{ secrets.PI_HOST }}
                    ProxyCommand cloudflared access ssh --hostname %h
                    IdentityFile ~/.ssh/id_ed25519
                    StrictHostKeyChecking no
                  EOF
                  chmod 600 ~/.ssh/config

            # Step 7: Deploy files to Raspberry Pi via SCP through Cloudflare Tunnel
            - name: Deploy files
              run: |
                  scp -r dist/* ${{ secrets.PI_USERNAME }}@${{ secrets.PI_HOST }}:${{ secrets.PI_TARGET_PATH }}

            # Step 8: Restart Nginx on Raspberry Pi
            - name: Restart Nginx
              run: |
                  ssh ${{ secrets.PI_USERNAME }}@${{ secrets.PI_HOST }} "sudo systemctl reload nginx"
