name: Build and Deploy to Raspberry Pi

on:
    push:
        branches:
            - main

jobs:
    build-and-deploy:
        runs-on: ubuntu-latest

        steps:
            # Step 1: Checkout the repository
            - name: Checkout code
              uses: actions/checkout@v4

            # Step 2: Set up Node.js
            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'npm'

            # Step 3: Install dependencies
            - name: Install dependencies
              run: npm ci

            # Step 4: Build the project
            - name: Build project
              run: npm run build

            # Step 5: Deploy to Raspberry Pi via SSH
            - name: Deploy to Raspberry Pi
              uses: appleboy/scp-action@v0.1.7
              with:
                  host: ${{ secrets.PI_HOST }}
                  username: ${{ secrets.PI_USERNAME }}
                  key: ${{ secrets.PI_SSH_KEY }}
                  port: ${{ secrets.PI_SSH_PORT || 22 }}
                  source: 'dist/*'
                  target: ${{ secrets.PI_TARGET_PATH }}
                  strip_components: 1

            # Step 6: Restart web server (optional)
            - name: Restart Nginx on Raspberry Pi
              uses: appleboy/ssh-action@v1.0.3
              with:
                  host: ${{ secrets.PI_HOST }}
                  username: ${{ secrets.PI_USERNAME }}
                  key: ${{ secrets.PI_SSH_KEY }}
                  port: ${{ secrets.PI_SSH_PORT || 22 }}
                  script: |
                      # Uncomment and modify based on your web server
                      sudo systemctl reload nginx
                      # OR for Apache:
                      # sudo systemctl reload apache2
                      echo "Deployment complete!"
